<html/>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My BSF Yahia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #000;
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* صورة الخلفية مع تأثير التعتيم لكي يظهر النص */
        .background {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://i.ibb.co/dwSfP0zg/photo-2026-03-14-12-50-01-yahia2.jpg') no-repeat center center/cover;
            filter: brightness(0.5); /* تعتيم الصورة */
            z-index: -1;
        }

        .content {
            text-align: center;
            padding: 20px;
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .heart {
            color: #ff4d4d;
            font-size: 40px;
            animation: beat 1s infinite;
            margin: 20px 0;
        }

        .message {
            font-size: 1.2rem;
            max-width: 300px;
            line-height: 1.6;
            margin: 0 auto;
            opacity: 0.9;
        }

        /* زر للعودة للموقع الأول */
        .back-btn {
            margin-top: 40px;
            display: inline-block;
            padding: 10px 25px;
            border: 1px solid white;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .back-btn:hover { background: white; color: black; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="content">
        <h1>YAHIA</h1>
        <div class="heart">❤️</div>
        <p class="message">"Having a best friend like you is the greatest gift. Happy Birthday to the one who knows me best."</p>
        
        <a href="index.html" class="back-btn">Go Back to Surprise 1</a>
    </div>

</body>
</html>
