<html/>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Yahia</title>
    <style>
        body { margin: 0; padding: 0; background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Poppins', sans-serif; color: white; overflow: hidden; }
        .container { text-align: center; position: relative; z-index: 2; }
        h1 { font-size: 3rem; margin-bottom: 10px; text-shadow: 0 0 10px #38bdf8; }
        .sub-text { font-size: 1.5rem; color: #38bdf8; margin-bottom: 20px; }
        .cake-container { font-size: 100px; cursor: pointer; transition: transform 0.3s; }
        .audio-player { position: fixed; bottom: 20px; background: rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 50px; backdrop-filter: blur(5px); border: 1px solid rgba(56, 189, 248, 0.3); }
        #message-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); z-index: 10; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .bsf-card { background: #1e293b; padding: 30px; border-radius: 20px; border: 1px solid #38bdf8; max-width: 450px; text-align: left; line-height: 1.8; }
        .confetti { position: absolute; width: 10px; height: 10px; z-index: 1; animation: fall 3s linear infinite; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>Happy Birthday</h1>
        <div class="sub-text">My bsf Yahia ✨</div>
        <div class="cake-container" onclick="showMessage()">🎂</div>
        <p>Click the cake for a message!</p>
    </div>

   <div class="audio-player">
    <p style="margin: 0 0 5px 0; font-size: 14px; text-align: center; color: #38bdf8;">Play Our Music 🎵</p>
    <audio id="myAudio" controls loop>
        <source src="music.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
</div>

    <div id="message-overlay">
        <div class="bsf-card">
            <h2 style="color: #38bdf8;">To my best friend Yahia,</h2>
            <p>Happy Birthday! You're the best brother. I'm so proud of you. Let's celebrate! 🥂</p>
            <button onclick="closeMessage()" style="background:none; border:1px solid #38bdf8; color:white; padding:5px 15px; border-radius:5px; cursor:pointer; margin-top: 15px;">Close</button>
        </div>
    </div>

    <script>
        function showMessage() { 
            document.getElementById('message-overlay').style.display = 'flex'; 
            createConfetti();
        }
        function closeMessage() { document.getElementById('message-overlay').style.display = 'none'; }
        
        function createConfetti() {
            for(let i=0; i<40; i++) {
                let div = document.createElement('div');
                div.className = 'confetti';
                div.style.left = Math.random() * 100 + 'vw';
                div.style.top = '-10px';
                div.style.animationDelay = Math.random() * 3 + 's';
                div.style.backgroundColor = ['#38bdf8', '#818cf8', '#f472b6'][Math.floor(Math.random()*3)];
                document.body.appendChild(div);
            }
        }
    </script>
</body>
</html>
